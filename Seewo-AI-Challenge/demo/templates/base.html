<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}希沃智教π{% endblock %}</title>
  <meta name="description" content="希沃智教π — 多Agent AI智能作业批改系统，步骤级批改、苏格拉底式辅导、订正闭环追踪。">

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {50:'#eef1fe',100:'#dde3fd',200:'#bbc7fb',300:'#8a9ff7',400:'#4a6cf7',500:'#2d4edb',600:'#1e3ab8',700:'#172d94',800:'#122578',900:'#0e1d62'},
            accent: {50:'#f0fdf4',100:'#dcfce7',500:'#10b981',700:'#047857'},
            danger: {50:'#fef2f2',100:'#fee2e2',500:'#ef4444',700:'#b91c1c'},
            warm: {50:'#fffbeb',100:'#fef3c7',500:'#f59e0b',700:'#b45309'},
          },
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','"Segoe UI"','"PingFang SC"','"Microsoft YaHei"','"Noto Sans CJK SC"','sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
            'slide-down': 'slideDown 0.3s ease-out',
            'scale-in': 'scaleIn 0.3s ease-out',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
            'shimmer': 'shimmer 1.5s infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideDown: { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            pulseSoft: { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.7' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom styles (design system & micro-interactions) -->
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Navbar -->
  <nav class="bg-white/85 backdrop-blur-md border-b border-gray-200/70 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="flex items-center gap-2.5 no-underline group">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-400 to-indigo-600 flex items-center justify-center text-white font-extrabold text-lg shadow-lg shadow-primary-400/30 transition-transform group-hover:scale-105">π</div>
          <span class="text-xl font-extrabold text-gray-900 tracking-tight brand-wordmark">希沃<span class="text-primary-400">智教π</span></span>
        </a>
        <div class="flex items-center gap-0.5 sm:gap-1 text-sm font-medium">
          {% block nav %}{% endblock %}
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 pb-20">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-100 py-8 text-center text-xs text-gray-400">
    希沃智教π · 多Agent AI智能作业批改系统 · 2026
  </footer>

  <!-- Init Lucide + scroll reveal -->
  <script>
    lucide.createIcons();

    // Scroll reveal — elements with [data-reveal] enter as they enter the viewport
    (function () {
      var els = document.querySelectorAll('[data-reveal]');
      if (!('IntersectionObserver' in window) || !els.length) {
        els.forEach(function (el) { el.classList.add('is-visible'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            var el = entry.target;
            var delay = el.getAttribute('data-reveal-delay');
            if (delay) { el.style.transitionDelay = delay + 'ms'; }
            el.classList.add('is-visible');
            io.unobserve(el);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
      els.forEach(function (el) { io.observe(el); });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
